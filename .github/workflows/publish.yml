name: Publish to NuGet

# Ways to publish:
#   - Push to main            -> prerelease  <VersionPrefix>-alpha.<run_number>  (e.g. 0.0.2-alpha.42)
#   - Push a tag vX.Y.Z       -> stable      X.Y.Z                               (e.g. 1.2.3)
#   - Manual (workflow_dispatch) with an explicit version
# To push to main WITHOUT publishing, put [skip ci] in the commit message.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version to publish (e.g. 1.2.3 or 1.2.3-beta)'
        required: true

permissions:
  id-token: write   # required for Trusted Publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Decide the version arguments passed to `dotnet pack`.
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Tag push -> stable release, version taken from the tag (strip leading "v")
            echo "args=-p:Version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run -> exact version from the input
            echo "args=-p:Version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Push to main -> prerelease, append the run number to the base VersionSuffix
            echo "args=-p:VersionSuffix=alpha.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: dotnet pack -c Release -o ./nupkg ${{ steps.version.outputs.args }}

      # Exchanges the GitHub OIDC token for a short-lived NuGet API key.
      # NUGET_USER is a repository secret holding your nuget.org username.
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
